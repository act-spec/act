name: Release

# Changesets-driven publish.
#
# For rc publishes: trigger manually with dist-tag=rc (the default).
# For stable 0.2.0: trigger with dist-tag=latest, or re-enable the
# push trigger below and set dist-tag default to latest.
#
# After rc.1 ships, switch to OIDC trusted publishing:
#   1. Run `npm trust github @act-spec/<pkg> --file release.yml --repo act-spec/act`
#      for every public package.
#   2. Remove NPM_TOKEN from the env block and from GitHub Secrets.
#   3. The id-token: write permission below already covers provenance.
on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (rc for pre-release, latest for stable)'
        required: true
        default: 'rc'
        type: choice
        options:
          - rc
          - latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate @act-spec/core types from schemas/
        run: pnpm -F @act-spec/core codegen
      - name: Build
        run: pnpm -r --filter "./packages/*" run build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish --tag ${{ inputs.dist-tag }}
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
