name: GitHub Pages

# Builds and deploys to GitHub Pages:
#  - apps/website       → /                       (act-spec.org root — Astro Starlight)
#  - apps/validator-web → /validator/
#  - apps/site-browser  → /browser/
#  - examples/<slug>    → /examples/<slug>/       (one path per static-buildable example)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate @act-spec/core types from schemas/
        run: pnpm -F @act-spec/core codegen

      - name: Build all packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Build deployable examples (real HTML sites only)
        # Only examples whose conformance build emits a real, runnable
        # HTML site are deployed — we publish exactly what the example
        # produces, never a synthesized landing page. The set in sync
        # with `scripts/assemble-examples.mjs#EXAMPLES`. Pure-data
        # examples (notion-knowledge-base, wordpress-blog), examples
        # blocked on upstream framework bugs (docusaurus-docs), and
        # runtime-only examples (hybrid-static-runtime-mcp,
        # nextjs-saas-runtime) are exercised by `pnpm -r conformance` in
        # ci.yml and intentionally not built here.
        #
        # `ACT_PAGES_BASE` tells frameworks (Astro `base`, Next.js
        # `basePath`, etc.) to prefix every `/_astro/...`, `/_next/...`,
        # `/assets/...`, and internal `<a href>` with the deployed
        # sub-path so the published site loads its CSS / JS / fonts and
        # in-page navigation works. `ACT_CATALOG_SITE` does the same for
        # the ecommerce example's manifest `canonical_url` (the
        # programmatic adapter bakes it into `human_url`).
        run: |
          ACT_PAGES_BASE=/examples/astro-docs/ pnpm -F @act-spec/example-astro-docs conformance
          ACT_PAGES_BASE=/examples/ecommerce-catalog/ ACT_CATALOG_SITE=https://act-spec.org/examples/ecommerce-catalog pnpm -F @act-spec/example-ecommerce-catalog conformance
          ACT_PAGES_BASE=/examples/eleventy-blog/ pnpm -F @act-spec/example-eleventy-blog conformance
          ACT_PAGES_BASE=/examples/nextjs-marketing/ pnpm -F @act-spec/example-nextjs-marketing conformance
          ACT_PAGES_BASE=/examples/starlight-docs/ pnpm -F @act-spec/example-starlight-docs conformance
          ACT_PAGES_BASE=/examples/vitepress-docs/ pnpm -F @act-spec/example-vitepress-docs conformance

      - name: Build website (Astro Starlight — act-spec.org root)
        run: pnpm -F @act-spec/website build

      - name: Build validator-web SPA
        env:
          VALIDATOR_WEB_BASE: /validator/
        run: pnpm -F @act-spec/validator-web build

      - name: Build site-browser SPA
        env:
          SITE_BROWSER_BASE: /browser/
        run: pnpm -F @act-spec/site-browser build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/validator _site/browser
          # Website at root
          cp -R apps/website/dist/. _site/
          # SPAs in subdirs
          cp -R apps/validator-web/dist/. _site/validator/
          cp -R apps/site-browser/dist/. _site/browser/
          # Static examples — copy each example's dist/ into
          # _site/examples/<slug>/ and rewrite the manifest's URL templates
          # so they resolve under the deployed sub-path.
          node scripts/assemble-examples.mjs _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
